<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1e293b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }

        header span {
            font-size: 12px;
            color: #64748b;
            background: #334155;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .clear-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome {
            text-align: center;
            margin: auto;
            max-width: 400px;
        }

        .welcome h2 {
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .welcome p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            justify-content: center;
        }

        .suggestion {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .suggestion:hover {
            background: #334155;
            color: #e2e8f0;
            border-color: #475569;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 720px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #3b82f6;
        }

        .message.assistant .avatar {
            background: #10b981;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .typing .bubble {
            color: #64748b;
        }

        .typing .bubble::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        #input-area {
            padding: 16px 24px;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        #input-form {
            display: flex;
            gap: 10px;
            max-width: 720px;
            margin: 0 auto;
        }

        #message-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #3b82f6;
        }

        #message-input::placeholder {
            color: #475569;
        }

        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        #send-btn:hover { background: #2563eb; }
        #send-btn:disabled { background: #1e40af; opacity: 0.5; cursor: not-allowed; }

        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            max-width: 720px;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>My AI Chatbot</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <span>GPT-4o-mini</span>
            <button class="clear-btn" onclick="clearChat()">New Chat</button>
        </div>
    </header>

    <div id="chat-container">
        <div class="welcome" id="welcome">
            <h2>Hello! I'm your AI assistant.</h2>
            <p>Ask me anything — I'm powered by GPT-4o-mini. Try one of these to get started:</p>
            <div class="suggestions">
                <div class="suggestion" onclick="sendSuggestion(this)">Explain APIs like I'm 5</div>
                <div class="suggestion" onclick="sendSuggestion(this)">Write a haiku about coding</div>
                <div class="suggestion" onclick="sendSuggestion(this)">What should I learn first in Python?</div>
            </div>
        </div>
    </div>

    <div id="input-area">
        <form id="input-form" onsubmit="sendMessage(event)">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const welcome = document.getElementById('welcome');

        function addMessage(role, text) {
            if (welcome) welcome.style.display = 'none';

            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'Y' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        function showTyping() {
            if (welcome) welcome.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = 'message assistant typing';
            msg.id = 'typing-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = 'Thinking';

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            sendBtn.disabled = true;
            addMessage('user', text);
            showTyping();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                removeTyping();

                if (data.error) {
                    const err = document.createElement('div');
                    err.className = 'error';
                    err.textContent = 'Error: ' + data.error;
                    chatContainer.appendChild(err);
                } else {
                    addMessage('assistant', data.reply);
                }
            } catch (err) {
                removeTyping();
                const errEl = document.createElement('div');
                errEl.className = 'error';
                errEl.textContent = 'Connection error. Is the server running?';
                chatContainer.appendChild(errEl);
            }

            sendBtn.disabled = false;
            messageInput.focus();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendSuggestion(el) {
            messageInput.value = el.textContent;
            sendMessage(new Event('submit'));
        }

        async function clearChat() {
            await fetch('/clear', { method: 'POST' });
            chatContainer.innerHTML = '';
            if (welcome) {
                welcome.style.display = '';
                chatContainer.appendChild(welcome);
            }
        }

        messageInput.focus();
    </script>
</body>
</html>
